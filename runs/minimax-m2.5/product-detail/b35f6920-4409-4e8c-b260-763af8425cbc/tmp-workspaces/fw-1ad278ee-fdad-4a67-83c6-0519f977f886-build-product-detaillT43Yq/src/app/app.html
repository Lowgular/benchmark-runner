<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  @if (product(); as p) {
    <div class="bg-white rounded-lg shadow-xl overflow-hidden max-w-md w-full">
      <img 
        [src]="p.image" 
        [alt]="p.name" 
        class="w-full h-64 object-cover"
      />
      <div class="p-6">
        <h1 class="text-3xl font-bold text-gray-900 mb-3">{{ p.name }}</h1>
        <p class="text-gray-600 text-base mb-4">{{ p.description }}</p>
        <p class="text-2xl font-semibold text-green-600">{{ p.price | currency:'USD' }}</p>
      </div>
    </div>
  }
</div>
