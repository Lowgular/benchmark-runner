<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Users</h1>

    <ul class="space-y-3">
      @for (user of users(); track user.id) {
        <li class="bg-white rounded-lg shadow-sm p-4 flex items-center gap-4 hover:shadow-md transition-shadow">
          <img
            [src]="user.avatarUrl"
            [alt]="user.email"
            class="w-12 h-12 rounded-full object-cover"
          />
          <div class="flex-1 min-w-0">
            <p class="text-gray-900 font-medium truncate">{{ user.email }}</p>
            <p class="text-xs text-gray-500">
              Last login: {{ user.lastLoggedInAt | date: 'dd.MM.yyyy, HH:mm' }}
            </p>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
