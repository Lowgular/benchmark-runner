@if (product(); as productData) {
  <div class="max-w-md mx-auto mt-10 p-6 bg-white rounded-xl shadow-lg border border-gray-200">
    <div class="flex justify-center mb-4">
      <img
        [src]="productData.image"
        [alt]="productData.name"
        class="w-40 h-40 object-cover rounded-lg"
      />
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ productData.name }}</h1>
    <p class="text-sm text-gray-600 mb-4 leading-relaxed">
      {{ productData.description }}
    </p>
    <p class="text-xl font-semibold text-green-600">
      {{ productData.price | currency: 'USD' }}
    </p>
  </div>
}
