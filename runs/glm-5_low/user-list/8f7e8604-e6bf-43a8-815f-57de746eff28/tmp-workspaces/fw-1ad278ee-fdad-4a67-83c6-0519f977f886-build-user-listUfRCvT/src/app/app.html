<div class="min-h-screen bg-gray-100 py-8">
  <div class="max-w-2xl mx-auto px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">User List</h1>
    <ul class="space-y-4">
      @for (user of users(); track user.id) {
        <li class="bg-white rounded-lg shadow-md p-4 flex items-center space-x-4 hover:shadow-lg transition-shadow">
          <img
            [src]="user.avatarUrl"
            [alt]="user.email"
            class="w-12 h-12 rounded-full object-cover flex-shrink-0"
          />
          <div class="flex-1 min-w-0">
            <p class="text-gray-800 font-medium truncate">{{ user.email }}</p>
            <p class="text-gray-500 text-sm">Last login: {{ user.lastLoggedInAt | europeanDate }}</p>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
