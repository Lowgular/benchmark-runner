<main class="min-h-screen bg-slate-100 flex items-center justify-center p-4">
  @if (product(); as p) {
    <article class="max-w-md w-full bg-white shadow-lg rounded-xl overflow-hidden border border-slate-200">
      <div class="flex flex-col items-center p-6 gap-4">
        <img
          ngSrc="{{ p.image }}"
          width="150"
          height="150"
          alt="{{ p.name }}"
          class="rounded-lg border border-slate-200 object-cover"
        />
        <div class="w-full space-y-3">
          <header class="flex flex-col gap-1">
            <h1 class="text-2xl font-semibold text-slate-900">{{ p.name }}</h1>
            <p class="text-sm text-slate-500">ID: {{ p.id }}</p>
          </header>
          <p class="text-sm text-slate-700 leading-relaxed">
            {{ p.description }}
          </p>
        </div>
      </div>
      <footer class="border-t border-slate-200 bg-slate-50 px-6 py-4 flex items-center justify-between">
        <span class="text-sm font-medium text-slate-600">Price</span>
        <span class="text-xl font-semibold text-emerald-600">
          {{ p.price | currency: 'USD':'symbol':'1.2-2' }}
        </span>
      </footer>
    </article>
  }
</main>
