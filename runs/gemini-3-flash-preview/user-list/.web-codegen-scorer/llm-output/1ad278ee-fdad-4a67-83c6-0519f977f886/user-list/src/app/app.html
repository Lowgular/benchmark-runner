<div class="min-h-screen bg-gray-50 p-6">
  <div class="max-w-3xl mx-auto">
    <header class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-gray-900 tracking-tight">Team Directory</h1>
      <p class="text-gray-500">A list of all users and their last activity.</p>
    </header>

    <ul class="bg-white shadow-sm ring-1 ring-gray-900/5 rounded-xl divide-y divide-gray-100">
      @for (user of users(); track user.id) {
        <li class="flex items-center gap-x-4 px-6 py-5 hover:bg-gray-50 transition-colors duration-150">
          <div class="relative flex-none">
            <img 
              [src]="user.avatarUrl" 
              alt="Avatar for {{user.email}}"
              class="h-12 w-12 rounded-full bg-gray-100 object-cover ring-2 ring-white"
            />
          </div>
          <div class="min-w-0 flex-auto">
            <p class="text-sm font-semibold leading-6 text-gray-900 truncate">
              {{ user.email }}
            </p>
            <p class="mt-1 text-xs leading-5 text-gray-500 flex items-center gap-1">
              <span class="shrink-0">Last login:</span>
              <span class="font-medium">{{ user.lastLoggedInAt | date: 'dd.MM.yyyy, HH:mm' }}</span>
            </p>
          </div>
          <div class="hidden sm:flex sm:flex-col sm:items-end">
            <div class="h-2 w-2 rounded-full bg-emerald-500"></div>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
