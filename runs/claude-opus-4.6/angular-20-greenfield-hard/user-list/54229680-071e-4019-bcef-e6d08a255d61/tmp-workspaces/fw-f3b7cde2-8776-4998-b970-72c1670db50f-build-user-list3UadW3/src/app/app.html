<div class="min-h-screen bg-gray-100 py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Users</h1>
    <ul class="space-y-3">
      <li
        *ngFor="let user of users"
        class="flex items-center gap-4 bg-white rounded-xl shadow-sm p-4 hover:shadow-md transition-shadow"
      >
        <img
          [src]="user.avatarUrl"
          [alt]="user.email"
          class="w-12 h-12 rounded-full object-cover shrink-0"
        />
        <div class="min-w-0">
          <p class="text-base font-medium text-gray-900 truncate">{{ user.email }}</p>
          <p class="text-xs text-gray-500">Last login: {{ formatDate(user.lastLoggedInAt) }}</p>
        </div>
      </li>
    </ul>
  </div>
</div>
