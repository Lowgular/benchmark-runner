<div class="min-h-screen bg-gray-50 py-8 px-4">
  <div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Users</h1>
    <ul class="space-y-3">
      @for (user of users(); track user.id) {
        <li class="flex items-center gap-4 bg-white rounded-xl shadow-sm p-4 hover:shadow-md transition-shadow">
          <img
            [src]="user.avatarUrl"
            [alt]="user.email"
            class="w-12 h-12 rounded-full object-cover flex-shrink-0"
          />
          <div class="min-w-0">
            <p class="text-gray-900 font-medium truncate">{{ user.email }}</p>
            <p class="text-xs text-gray-500 mt-0.5">Last login: {{ user.lastLoggedInAt | europeanDate }}</p>
          </div>
        </li>
      }
    </ul>
  </div>
</div>
