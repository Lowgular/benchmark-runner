<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  @if (product(); as data) {
    <div class="max-w-md bg-white rounded-xl shadow-lg transition-transform hover:scale-[1.02] overflow-hidden">
      <div class="relative">
        <img [src]="data.image" [alt]="data.name" class="w-full h-64 object-cover">
      </div>
      <div class="p-6">
        <h1 class="text-2xl font-bold text-gray-900 mb-2">{{ data.name }}</h1>
        <p class="text-gray-600 text-sm leading-relaxed mb-6">
          {{ data.description }}
        </p>
        <div class="flex items-center justify-between">
          <span class="text-3xl font-extrabold text-blue-600">
            {{ data.price | currency:'USD':'symbol':'1.2-2' }}
          </span>
          <button class="px-6 py-2 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition-colors focus:ring-4 focus:ring-blue-200">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  }
</div>
