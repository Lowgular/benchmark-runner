<div class="min-h-screen bg-gray-50 flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Welcome Back</h1>
      <p class="text-gray-500">Please enter your details to login</p>
    </div>

    @if (isLoggedIn()) {
      <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative text-center animate-bounce" role="alert">
        <span class="block sm:inline">logged in successfully</span>
      </div>
    } @else {
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input 
            id="email" 
            type="email" 
            formControlName="email" 
            placeholder="test@lowgular.io"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input 
            id="password" 
            type="password" 
            formControlName="password" 
            placeholder="••••••••"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition-all"
          />
        </div>

        <button 
          type="submit" 
          [disabled]="loginForm.invalid"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-300 text-white font-semibold py-2 px-4 rounded-lg transition-colors duration-200"
        >
          Submit
        </button>
      </form>
    }
  </div>
</div>
