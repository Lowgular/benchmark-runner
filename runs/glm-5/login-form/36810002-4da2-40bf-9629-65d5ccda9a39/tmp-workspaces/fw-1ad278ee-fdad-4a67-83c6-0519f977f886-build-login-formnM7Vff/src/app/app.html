<div class="min-h-screen flex items-center justify-center bg-gray-100">
  @if (isLoggedIn()) {
    <div class="bg-white p-8 rounded-lg shadow-md">
      <p class="text-green-600 text-lg font-semibold">logged in successfully</p>
    </div>
  } @else {
    <form
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
      class="bg-white p-8 rounded-lg shadow-md w-full max-w-md"
    >
      <h1 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h1>

      <div class="mb-4">
        <label for="email" class="block text-gray-700 font-medium mb-2"
          >Email</label
        >
        <input
          type="text"
          id="email"
          formControlName="email"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter your email"
        />
      </div>

      <div class="mb-6">
        <label for="password" class="block text-gray-700 font-medium mb-2"
          >Password</label
        >
        <input
          type="password"
          id="password"
          formControlName="password"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          placeholder="Enter your password"
        />
      </div>

      <button
        type="submit"
        [disabled]="loginForm.invalid"
        class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 disabled:bg-gray-300 disabled:cursor-not-allowed transition-colors"
      >
        Submit
      </button>
    </form>
  }
</div>
