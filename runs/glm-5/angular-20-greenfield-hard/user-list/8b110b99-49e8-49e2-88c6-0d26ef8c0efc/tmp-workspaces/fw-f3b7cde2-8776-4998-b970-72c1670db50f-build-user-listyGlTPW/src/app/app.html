<div class="container mx-auto p-4 max-w-2xl">
  <h1 class="text-2xl font-bold mb-6 text-gray-800">Users</h1>
  <ul class="space-y-4">
    <li 
      *ngFor="let user of users" 
      class="flex items-center p-4 bg-white shadow-md rounded-lg hover:shadow-lg transition-shadow"
    >
      <img 
        [src]="user.avatarUrl" 
        [alt]="user.email" 
        class="w-12 h-12 rounded-full mr-4 object-cover bg-gray-200"
      >
      <div class="flex-1">
        <p class="text-lg font-medium text-gray-900">{{ user.email }}</p>
        <p class="text-sm text-gray-500">Last login: {{ formatDate(user.lastLoggedInAt) }}</p>
      </div>
    </li>
  </ul>
</div>
