<main class="min-h-screen bg-slate-100 p-6">
  <section class="mx-auto max-w-2xl">
    @if (product()) {
      <article class="rounded-xl bg-white p-6 shadow-lg">
        <div class="flex flex-col gap-6 sm:flex-row">
          <div class="flex justify-center sm:w-1/3">
            <img
              ngOptimizedImage
              width="150"
              height="150"
              class="h-40 w-40 rounded-lg object-cover"
              [src]="product()?.image"
              [alt]="product()?.name"
            />
          </div>
          <div class="flex-1 space-y-4">
            <h1 class="text-2xl font-semibold text-slate-900">
              {{ product()?.name }}
            </h1>
            <p class="text-sm text-slate-600">
              {{ product()?.description }}
            </p>
            <p class="text-lg font-bold text-emerald-600">
              {{ formattedPrice() | currency : "USD" : "symbol" : "1.2-2" }}
            </p>
          </div>
        </div>
      </article>
    }
  </section>
</main>
