<div class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
  @if (product(); as product) {
    <div class="bg-white shadow-lg rounded-lg overflow-hidden max-w-sm w-full p-6 space-y-4">
      <div class="flex justify-center">
        <img
          [ngSrc]="product.image"
          alt="{{ product.name }}"
          width="150"
          height="150"
          class="rounded-full object-cover border-4 border-blue-200"
          priority
        >
      </div>
      <h1 class="text-3xl font-bold text-gray-800 text-center">{{ product.name }}</h1>
      <p class="text-gray-600 text-center text-sm">{{ product.description }}</p>
      <div class="flex justify-center items-baseline space-x-2">
        <span class="text-4xl font-extrabold text-blue-600">
          {{ product.price | currency:'USD':'symbol':'1.2-2' }}
        </span>
      </div>
    </div>
  }
</div>
